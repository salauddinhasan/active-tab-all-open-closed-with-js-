<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home page GitHub issues tracker</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
 
    <!-- tab section -->
    <section class="tab-section py-5 md:pt-12">
      <!-- container -->
      <div class="max-w-screen-2xl mx-auto shadow-md p-3 rounded-lg">
        <!-- tab container -->
        <div class="tab-container flex gap-2">
          <!-- all tab -->
          <button id="all-tab" class="btn w-24 bg-blue-500 text-white">
            All
          </button>
          <!-- open tab  -->
          <button id="open-tab" class="btn w-24 bg-gray-100 text-black">
            Open
          </button>
          <!-- closed tab -->
          <button id="closed-tab" class="btn w-24 bg-gray-100 text-black">
            Closed
          </button>
        </div>
      </div>
    </section>

    </body>
</html>
